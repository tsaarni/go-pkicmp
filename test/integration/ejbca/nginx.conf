events {}
http {
    server {
        listen 8080;
        location / {
            proxy_pass https://ejbca:8443;
            proxy_ssl_certificate /certs/superadmin-cert.pem;
            proxy_ssl_certificate_key /certs/superadmin-key.pem;
            proxy_ssl_verify off;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # FORCE EJBCA to think the browser is using HTTPS
            # This prevents the ERR_SSL_PROTOCOL_ERROR redirect loop
            proxy_set_header X-Forwarded-Proto https;

            proxy_hide_header Content-Security-Policy;

            # Intercept redirects from EJBCA and rewrite them to http
            proxy_redirect https:// http://;
        }
    }
}
