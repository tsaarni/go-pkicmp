name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: 'stable'
          cache: true

      # OpenSSL 3.2+ is required for the integration tests because it introduced the
      # built-in CMP mock server features, specifically the '-port' and '-rsp_key'
      # options in the 'openssl cmp' application.
      #
      # Ubuntu 24.04 (current ubuntu-latest) only provides OpenSSL 3.0.x, which lacks
      # these server-side testing capabilities.
      - name: Cache OpenSSL LTS
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /opt/openssl-lts
          key: ${{ runner.os }}-openssl-3.5.6

      - name: Build OpenSSL LTS
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev perl wget
          VERSION="3.5.6"
          wget -q https://www.openssl.org/source/openssl-${VERSION}.tar.gz
          tar -xf openssl-${VERSION}.tar.gz
          cd openssl-${VERSION}
          ./config --prefix=/opt/openssl-lts --openssldir=/opt/openssl-lts shared zlib
          make -j$(nproc) > /dev/null
          sudo make install_sw > /dev/null

      - name: Add OpenSSL LTS to path
        run: |
          echo "/opt/openssl-lts/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=/opt/openssl-lts/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Run unit tests
        run: make test

      - name: Run OpenSSL integration tests
        run: make integration-openssl

      - name: Setup EJBCA environment
        run: make setup

      - name: Run EJBCA integration tests
        run: make integration-ejbca

      - name: Teardown EJBCA environment
        if: always()
        run: make teardown
